<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Card</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="course-card">

        <!-- Left Banner -->
        <div class="course-image">
            <div class="banner-content">
                <span class="brand">Google</span>
                <h2>Data<br>Analytics</h2>
                <p>Complete Guide</p>

                <div class="chart">
                    <div class="bar bar1"></div>
                    <div class="bar bar2"></div>
                    <div class="bar bar3"></div>
                    <svg viewBox="0 0 100 50">
                        <polyline points="5,40 35,25 65,30 95,10"
                            fill="none"
                            stroke="#5a8dff"
                            stroke-width="3"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="course-content">

            <div class="top-row">
                <span class="badge">FREE</span>
            </div>

            <h3>Google Data Analytics Complete Guide</h3>

            <p class="description">
                Beginner friendly guide to learn Data Analytics from
                scratch with real examples.
            </p>

            <div class="details">
                <div>
                    <i class="fa-regular fa-file-lines"></i>
                    120 Pages
                </div>

                <div>
                    <i class="fa-solid fa-globe"></i>
                    English
                </div>

                <div>
                    <i class="fa-regular fa-clock"></i>
                    Updated 28 May 2026
                </div>
            </div>

            <div class="card-footer">

                <div class="rating">
                    ⭐ 4.8 <span>(320)</span>
                </div>

                <button class="download-btn">
                    Download Free
                </button>

            </div>

        </div>

    </div>

</body>
</html>
