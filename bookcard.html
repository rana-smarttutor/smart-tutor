<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics Ebook Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f4f5f7;
font-family:Inter,Segoe UI,Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

/* CARD */

.card{
width:min(320px,90vw);
background:#fff;
padding:20px;
border-radius:24px;
border:1px solid #e8eaed;

box-shadow:
0 12px 30px rgba(0,0,0,.08),
0 4px 12px rgba(0,0,0,.05);
}

/* COVER */

.cover{

width:100%;

height:20dvh;
max-height:190px;
min-height:140px;

aspect-ratio:16/9;

border-radius:18px;
overflow:hidden;

position:relative;

background:
linear-gradient(
135deg,
#0b2f5f,
#143d73 60%,
#0a284d
);

}

/* grid */

.cover::before{
content:"";
position:absolute;
inset:0;

opacity:.05;

background-image:
linear-gradient(to right,#fff 1px,transparent 1px),
linear-gradient(to bottom,#fff 1px,transparent 1px);

background-size:18px 18px;
}

/* analytics box */

.analytics-box{

position:absolute;

top:8%;
left:22%;

width:28%;
height:30%;

border-radius:10px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.12);

}

/* graph lines */

.line{
position:absolute;
height:3px;
background:#f8a822;
border-radius:4px;
}

.l1{
top:24%;
left:28%;
width:10%;
transform:rotate(-30deg);
}

.l2{
top:20%;
left:35%;
width:8%;
transform:rotate(20deg);
}

.l3{
top:15%;
left:41%;
width:9%;
transform:rotate(-28deg);
}

/* upper bars */

.upper-bars{

position:absolute;

top:12%;
left:4%;

display:flex;
gap:5px;

align-items:flex-end;

}

.ub{
width:10px;
background:#63c1ff;
border-radius:3px 3px 0 0;
}

.u1{height:26px;}
.u2{height:42px;}
.u3{height:70px;}
.u4{height:55px;}

/* lower bars */

.lower-bars{

position:absolute;

left:3%;
bottom:0;

display:flex;
gap:8px;

align-items:flex-end;

}

.lb{
width:16px;
border-radius:4px 4px 0 0;
}

.orange{
background:#ff9f1d;
}

.blue{
background:#58b8ff;
}

.lbar1{height:70px;}
.lbar2{height:120px;}
.lbar3{height:60px;}
.lbar4{height:95px;}

/* bottom chart */

.bottom-chart{

position:absolute;

left:40%;
bottom:10%;

display:flex;
gap:7px;

align-items:flex-end;

}

.bc{
width:10px;
background:#4f87e7;
border-radius:3px 3px 0 0;
}

.b1{height:20px;}
.b2{height:35px;}
.b3{height:52px;}
.b4{height:72px;}

/* arrow */

.arrow{

position:absolute;

left:41%;
bottom:32%;

font-size:
clamp(26px,3vw,38px);

color:#f7a623;

}

/* TEXT */

.cover-text{

position:absolute;

right:14px;
top:12%;

text-align:right;

color:white;

}

.cover-text h1{

font-size:
clamp(14px,1.5vw,18px);

font-weight:800;

line-height:1.05;

letter-spacing:.4px;

}

.cover-text .ebook{

font-size:
clamp(18px,2vw,22px);

font-weight:700;

margin-top:4px;

color:#e2e8f0;

}

.cover-text p{

font-size:
clamp(11px,1.2vw,14px);

line-height:1.1;

margin-top:4px;

color:#d4dbe4;

}

/* BADGES */

.badges{

display:flex;

gap:8px;

margin-top:15px;

flex-wrap:wrap;

}

.badge{

padding:6px 10px;

border-radius:8px;

font-size:12px;

font-weight:700;

}

.pdf{
background:#2563EB;
color:white;
}

.beginner{
background:#FFD54A;
}

.free{
background:#30b868;
color:white;
}

/* CONTENT */

.card-title{

font-size:24px;

font-weight:700;

line-height:1.2;

margin-top:18px;

color:#101828;

}

.desc{

margin-top:8px;

font-size:14px;

line-height:1.5;

color:#6b7280;

}

.info{

margin-top:14px;

font-size:14px;

color:#667085;

}

/* BUTTONS */

.buttons{

display:flex;

gap:12px;

margin-top:20px;

}

.btn{

flex:1;

padding:12px;

border:none;

border-radius:14px;

font-size:15px;

font-weight:700;

cursor:pointer;

}

.download{
background:#2563EB;
color:white;
}

.preview{
background:#fff;
border:1px solid #ddd;
}

/* FOOTER */

.bottom{

margin-top:22px;

padding-top:15px;

border-top:1px solid #ececec;

display:flex;

justify-content:space-between;

font-size:14px;

color:#666;

}

</style>
</head>

<body>

<div class="card">

<div class="cover">

<div class="analytics-box"></div>

<div class="line l1"></div>
<div class="line l2"></div>
<div class="line l3"></div>

<div class="upper-bars">
<div class="ub u1"></div>
<div class="ub u2"></div>
<div class="ub u3"></div>
<div class="ub u4"></div>
</div>

<div class="lower-bars">
<div class="lb orange lbar1"></div>
<div class="lb orange lbar2"></div>
<div class="lb blue lbar3"></div>
<div class="lb blue lbar4"></div>
</div>

<div class="arrow">↗</div>

<div class="bottom-chart">
<div class="bc b1"></div>
<div class="bc b2"></div>
<div class="bc b3"></div>
<div class="bc b4"></div>
</div>

<div class="cover-text">
<h1>GOOGLE<br>ANALYTICS 4</h1>
<div class="ebook">Ebook</div>
<p>Beginner<br>Guide</p>
</div>

</div>

<div class="badges">
<span class="badge pdf">PDF</span>
<span class="badge beginner">Beginner</span>
<span class="badge free">Free</span>
</div>

<h2 class="card-title">
Google Analytics 4 Ebook
</h2>

<p class="desc">
Learn analytics basics easily with this beginner-friendly ebook.
</p>

<div class="info">
📅 Uploaded: 28 May 2026
</div>

<div class="buttons">
<button class="btn download">
Download ↓
</button>

<button class="btn preview">
Preview 👁
</button>
</div>

<div class="bottom">
<span>♡ Save</span>
<span>📚 Marketing</span>
</div>

</div>

</body>
</html>
